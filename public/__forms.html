<!DOCTYPE html>
<html>
  <head>
    <title>Netlify Forms</title>
  </head>
  <body>
    <form
      name="sblandscaping-quote"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="sblandscaping-quote" />
      <input name="name" type="text" />
      <input name="phone" type="tel" />
      <input name="town" type="text" />
      <input name="service" type="text" />
      <input name="heard" type="text" />
      <textarea name="details"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
